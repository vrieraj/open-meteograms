<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Meteograms</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div id="layout">

    <!-- Map area -->
    <div id="map-area">
      <div id="toolbar">
        <div id="search-container">
          <input type="text" id="search-input" placeholder="Search location…" autocomplete="off">
          <ul id="search-dropdown" class="hidden"></ul>
        </div>
        <div id="basemap-btns">
          <button class="basemap-btn active" data-basemap="map">Map</button>
          <button class="basemap-btn" data-basemap="satellite">Satellite</button>
          <button class="basemap-btn" data-basemap="hybrid">Hybrid</button>
        </div>
      </div>
      <div id="map"></div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar">
      <div id="sidebar-header">🌤️ Open Meteograms</div>

      <div class="panel">
        <div class="panel-title collapsible open" data-target="location-body">📍 Location</div>
        <div id="location-body" class="panel-body">
          <div id="location-content">
            <p class="hint">Search a location or click the map</p>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title collapsible" data-target="layers-body">📂 Vector layers</div>
        <div id="layers-body" class="panel-body collapsed">
          <input type="file" id="geojson-upload" accept=".geojson,.json">
          <div id="layers-list"></div>
        </div>
      </div>

      <div class="panel" id="dates-panel">
        <div class="panel-title collapsible open" data-target="dates-body">📅 Date range</div>
        <div id="dates-body" class="panel-body">
          <div class="date-row">
            <label>Start</label>
            <input type="date" id="date-start">
          </div>
          <div class="date-row">
            <label>End</label>
            <input type="date" id="date-end">
          </div>
          <div id="date-warning"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title collapsible open" data-target="models-body">🌐 Weather models</div>
        <div id="models-body" class="panel-body">
          <div id="models-selects"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title collapsible" data-target="stations-body">📡 Weather stations</div>
        <div id="stations-body" class="panel-body collapsed">
          <input type="password" id="wu-key" placeholder="WU API Key">
          <div class="slider-row">
            <label>Radius: <span id="radius-val">50</span> km</label>
            <input type="range" id="radius-slider" min="10" max="200" step="10" value="50">
          </div>
          <button id="search-stations-btn">🔍 Search stations</button>
          <div id="stations-list"></div>
        </div>
      </div>

      <div id="actions">
        <button id="generate-btn" class="primary" disabled>⚡ Generate Meteogram</button>
        <button id="excel-btn" class="secondary" disabled>⬇ Download Excel</button>
        <div id="about-link">
          <a href="https://github.com/vrieraj/open-meteograms" target="_blank">About · GitHub</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Meteogram modal -->
  <div id="modal" class="hidden">
    <div id="modal-backdrop"></div>
    <div id="modal-content">
      <div id="modal-header">
        <span id="modal-title">Meteogram</span>
        <div id="modal-header-right">
          <div id="modal-tabs">
            <button class="modal-tab active" data-tab="tab-meteo">🌤 Meteogram</button>
            <button class="modal-tab" data-tab="tab-skewt">📡 Skew-T</button>
          </div>
          <button id="modal-close">✕</button>
        </div>
      </div>
      <div id="modal-body">
        <!-- Meteogram panel -->
        <div id="tab-meteo" class="tab-panel">
          <div id="modal-spinner">Generating meteogram…</div>
          <img id="meteogram-img" class="hidden" alt="Meteogram">
          <div id="modal-error" class="hidden"></div>
          <div id="meteo-zoom" class="hidden">
            <div class="zoom-header">
              <span id="zoom-label"></span>
              <button id="zoom-apply-btn" class="zoom-btn">Actualizar</button>
            </div>
            <div class="dual-range-wrap">
              <div class="dual-range-track"></div>
              <div class="dual-range-fill" id="dual-range-fill"></div>
              <input type="range" id="zoom-start-sl" class="zoom-sl" min="0" max="10" value="0" step="1">
              <input type="range" id="zoom-end-sl" class="zoom-sl" min="0" max="10" value="10" step="1">
            </div>
          </div>
        </div>
        <!-- Skew-T panel -->
        <div id="tab-skewt" class="tab-panel hidden">
          <div id="skewt-controls">
            <div class="ctrl-row">
              <label>Model</label>
              <select id="skewt-model-sel"></select>
            </div>
            <div class="ctrl-row hidden" id="skewt-time-row">
              <label>Hora</label>
              <input type="range" id="skewt-slider" min="0" max="0" value="0" step="1">
              <span id="skewt-time-label"></span>
              <button id="skewt-prev" class="nav-arrow" title="Previous">◄</button>
              <button id="skewt-next" class="nav-arrow" title="Next">►</button>
            </div>
          </div>
          <div id="skewt-spinner" class="hidden">⏳ Loading Skew-T…</div>
          <div id="skewt-main" class="hidden">
            <img id="skewt-img" alt="Skew-T">
            <div id="skewt-indices"></div>
          </div>
          <div id="skewt-error" class="hidden"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
